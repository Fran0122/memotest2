<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Atento al Mate by Playadito</title>
<link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--yellow:#F5C518;--yellow-bg:#EDBA00;--yellow-light:#FFD94A;--green:#1B6B2A;--green-dark:#14521F;--brown:#3A2A00;--brown-dark:#2A1E00;--gold-card:#D4A017;--red:#C62828;--white:#FFFDE7;--black:#1A1200}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--yellow-bg);font-family:'Nunito',sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation;cursor:default}
.bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#F5C518 0%,#EDBA00 30%,#E5B200 60%,#EDBA00 100%)}
.bg-pattern{position:fixed;inset:0;z-index:0;opacity:.07;background-image:url("data:image/svg+xml,%3Csvg width='50' height='70' viewBox='0 0 50 70' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 5 C20 18,15 28,25 45 C35 28,30 18,25 5Z' fill='%23806000'/%3E%3C/svg%3E");background-size:4.5vw 6.3vw}
.watermark{position:fixed;bottom:1.2vh;left:0;width:100vw;text-align:center;z-index:500;font-family:'Nunito',sans-serif;font-size:1.4vw;font-weight:700;letter-spacing:.3vw;color:rgba(58,42,0,.18);pointer-events:none;text-transform:uppercase}

.game-container{position:relative;width:100vw;height:100vh;z-index:10;display:flex;flex-direction:column;align-items:center}
.header{width:100%;padding:2vh 3vw .5vh;display:flex;flex-direction:column;align-items:center}
.logo-img{height:10vh;width:auto;object-fit:contain;filter:drop-shadow(0 .3vh .8vh rgba(0,0,0,.15))}
.timer-area{width:100%;padding:.8vh 6vw;display:flex;align-items:center;gap:2.5vw;justify-content:center}
.timer-label{font-family:'Passion One',sans-serif;font-size:3.2vw;color:var(--red);text-transform:uppercase;letter-spacing:.2vw;font-weight:900;animation:pulseT .6s ease-in-out infinite alternate;opacity:0;transition:opacity .3s;white-space:nowrap}
.timer-label.visible{opacity:1}
@keyframes pulseT{from{opacity:.7;transform:scale(1)}to{opacity:1;transform:scale(1.06)}}
.timer-display{font-family:'Passion One',sans-serif;font-size:8vw;font-weight:900;color:var(--green-dark);min-width:16vw;text-align:center;line-height:1;transition:color .3s}
.timer-display.urgent{color:var(--red)}
.timer-bar{flex:1;max-width:35vw;height:1vh;background:rgba(0,0,0,.1);border-radius:.5vh;overflow:hidden}
.timer-bar-fill{height:100%;background:var(--green);border-radius:.5vh;transition:width 1s linear,background .3s;width:100%}
.timer-bar-fill.urgent{background:var(--red)}
.phase-title{font-family:'Passion One',sans-serif;font-size:5.8vw;font-weight:900;color:var(--black);text-align:center;text-transform:uppercase;height:5vh;display:flex;align-items:center;justify-content:center;letter-spacing:.2vw;padding:0 3vw}
.instruction-hint{font-family:'Nunito',sans-serif;font-size:2.6vw;font-weight:700;color:rgba(58,42,0,.55);height:2.5vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 4vw}
.board-wrapper{flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:1vh 4vw}
.board{display:grid;grid-template-columns:repeat(3,27vw);grid-template-rows:repeat(2,19vh);gap:2.5vw;position:relative}
.card-slot{width:27vw;height:19vh;position:relative}
.card{width:100%;height:100%;position:absolute;left:0;top:0;cursor:pointer;border-radius:2vw;z-index:1}
.card.disabled{pointer-events:none}
.card.animating{z-index:50}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);border-radius:2vw}
.card:not(.disabled):active .card-back-side{filter:brightness(1.15)}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-face,.card-back-side{width:100%;height:100%;position:absolute;backface-visibility:hidden;border-radius:2vw;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.card-back-side{background:linear-gradient(145deg,#2A8C3C,#1B6B2A,#14521F);border:.35vw solid rgba(255,255,255,.12);box-shadow:0 .5vh 2vw rgba(0,0,0,.25),inset 0 .1vh 0 rgba(255,255,255,.1);transition:filter .15s,transform .15s}
.card-back-mate{font-size:10vw;filter:drop-shadow(0 .2vh .5vh rgba(0,0,0,.3))}
.card-face{transform:rotateY(180deg);box-shadow:0 .5vh 2.5vw rgba(0,0,0,.2)}
.card-face.prize{background:linear-gradient(145deg,#FFF8E1,#FFE9A0,#FFD54F);border:.35vw solid var(--gold-card);box-shadow:0 .5vh 2.5vw rgba(0,0,0,.15),0 0 3vw rgba(212,160,23,.3)}
.card-face.empty{background:linear-gradient(145deg,#E8E8E8,#C0C0C0);border:.35vw solid rgba(0,0,0,.1)}
.card-face-icon{font-size:9vw;margin-bottom:.3vh}
.card-face-icon img{height:11vh;width:auto;object-fit:contain;filter:drop-shadow(0 .3vh 1vh rgba(180,130,0,.5))}
.card-face-text{font-family:'Passion One',sans-serif;font-size:2.6vw;text-align:center;padding:0 1vw}
.card-face.prize .card-face-text{color:var(--brown);font-weight:900}
.card-face.empty .card-face-text{color:rgba(0,0,0,.45)}
.card.selected .card-back-side{border-color:var(--white);box-shadow:0 0 4vw rgba(255,255,255,.6),0 .5vh 2vw rgba(0,0,0,.3)}
.card.reveal-prize.flipped .card-face.prize{animation:prizeGlow 1s ease-in-out infinite alternate}
@keyframes prizeGlow{from{box-shadow:0 0 3vw rgba(255,209,0,.4),0 .5vh 2.5vw rgba(0,0,0,.15)}to{box-shadow:0 0 6vw rgba(255,209,0,.8),0 .5vh 2.5vw rgba(0,0,0,.15)}}
.card.shake .card-back-side{animation:cardShake .3s ease-in-out}
@keyframes cardShake{0%,100%{transform:rotate(0)}25%{transform:rotate(3deg)}75%{transform:rotate(-3deg)}}
.card.pulse-distract .card-back-side{animation:cardPulse .35s ease-in-out}
@keyframes cardPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* ─── ATTRACT: fondo amarillo, sin backdrop oscuro ─── */
.screen-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s;opacity:0;visibility:hidden}
.screen-overlay.active{opacity:1;visibility:visible}
.screen-overlay .backdrop{position:absolute;inset:0}

/* Attract = fondo amarillo */
#attractScreen .backdrop{
  background:linear-gradient(180deg,#F5C518 0%,#EDBA00 30%,#E5B200 60%,#EDBA00 100%);
}
/* Attract pattern overlay */
#attractScreen::before{
  content:'';position:absolute;inset:0;z-index:0;opacity:.07;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg width='50' height='70' viewBox='0 0 50 70' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 5 C20 18,15 28,25 45 C35 28,30 18,25 5Z' fill='%23806000'/%3E%3C/svg%3E");
  background-size:4.5vw 6.3vw;
}

/* Result = fondo oscuro */
#resultScreen .backdrop{
  background:rgba(26,16,0,.92);backdrop-filter:blur(1.2vw);
}

.screen-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:1.8vh;text-align:center;padding:0 5vw}

/* ATTRACT ELEMENTS - dark text on yellow */
.attract-logo{height:16vh;width:auto;object-fit:contain;filter:drop-shadow(0 .4vh 1.5vh rgba(0,0,0,.15));animation:bounceM 2.5s ease-in-out infinite}
@keyframes bounceM{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5vh)}}
.attract-question{
  font-family:'Passion One',sans-serif;font-size:5vw;
  color:var(--brown);margin-top:2vh;line-height:1.2;
  text-shadow:0 .1vh 0 rgba(255,255,255,.2);
}
.attract-cta{
  font-family:'Passion One',sans-serif;font-size:4.5vw;
  color:var(--green-dark);text-transform:uppercase;letter-spacing:.3vw;
  animation:pulseCTA 1.5s ease-in-out infinite;margin-top:4vh;line-height:1.3;
  text-shadow:0 .1vh 0 rgba(255,255,255,.15);
}
@keyframes pulseCTA{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}

/* RESULT ELEMENTS */
.result-icon{height:18vh;width:auto;object-fit:contain;animation:resPop .6s cubic-bezier(.34,1.56,.64,1) forwards;transform:scale(0);filter:drop-shadow(0 .5vh 2vh rgba(180,130,0,.5))}
.result-icon-emoji{font-size:15vw;animation:resPop .6s cubic-bezier(.34,1.56,.64,1) forwards;transform:scale(0)}
@keyframes resPop{to{transform:scale(1)}}
.result-title{font-family:'Passion One',sans-serif;font-size:9.5vw;font-weight:900;line-height:1}
.result-title.win{color:var(--yellow);text-shadow:0 0 4vw rgba(255,209,0,.6),0 .2vh 1vw rgba(0,0,0,.3)}
.result-title.lose{color:var(--white);text-shadow:0 .2vh 1vw rgba(0,0,0,.4)}
.result-sub{font-family:'Nunito',sans-serif;font-size:3vw;font-weight:700;color:rgba(255,255,255,.85);max-width:75vw;line-height:1.4}
.result-restart-btn{margin-top:2.5vh;padding:1.6vh 8vw;font-family:'Passion One',sans-serif;font-size:4.5vw;color:var(--brown-dark);background:linear-gradient(135deg,var(--yellow),var(--yellow-light));border:none;border-radius:5vw;cursor:pointer;text-transform:uppercase;letter-spacing:.3vw;box-shadow:0 .3vh 2.5vw rgba(255,209,0,.4),0 .1vh .8vw rgba(0,0,0,.2);animation:btnGlow 2s ease-in-out infinite alternate;transition:transform .15s}
.result-restart-btn:active{transform:scale(.96)}
@keyframes btnGlow{from{box-shadow:0 .3vh 2.5vw rgba(255,209,0,.3),0 .1vh .8vw rgba(0,0,0,.2)}to{box-shadow:0 .3vh 4vw rgba(255,209,0,.7),0 .1vh .8vw rgba(0,0,0,.2)}}
.result-auto-hint{font-family:'Nunito',sans-serif;font-size:1.8vw;color:rgba(255,255,255,.35);margin-top:.5vh}
.confetti{position:fixed;z-index:300;pointer-events:none;animation:confFall linear forwards}
@keyframes confFall{0%{transform:translateY(-4vh) rotate(0deg) scale(0);opacity:0}10%{transform:translateY(0) rotate(40deg) scale(1);opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(.4);opacity:0}}
</style>
</head>

  <div class="timer-area">
    <div class="timer-label" id="timerLabel">¡APURATE!</div>
    <div class="timer-display" id="timerDisplay">00:30</div>
    <div class="timer-bar"><div class="timer-bar-fill" id="timerBarFill"></div></div>
  </div>
  <div class="phase-title" id="phaseTitle"></div>
  <div class="instruction-hint" id="instructionHint"></div>
  <div class="board-wrapper">
    <div class="board" id="board"></div>
  </div>
</div>
<div id="confettiContainer"></div>

<script>
const MATE_IMG_SRC=document.getElementById('mateSrc').src;
const C={CARDS:6,REVEAL_TIME:2200,SHUFFLE_ROUNDS:18,SWAP_SPEED_START:340,SWAP_SPEED_END:180,SWAP_PAUSE_START:120,SWAP_PAUSE_END:30,DOUBLE_SWAP_START:4,DOUBLE_SWAP_CHANCE:.45,TRIPLE_MOVE_CHANCE:.25,SHAKE_CHANCE:.3,PULSE_CHANCE:.25,SELECT_TIME:5000,INACTIVITY:20000,TOTAL_TIME:30};
let S={phase:'attract',prize:0,cards:[],slots:[],time:C.TOTAL_TIME,tInt:null,gTo:null,iTo:null};
let cardOrder=[];
const $=id=>document.getElementById(id);
const board=$('board'),phaseT=$('phaseTitle'),tDisp=$('timerDisplay'),tLabel=$('timerLabel'),tBar=$('timerBarFill'),attract=$('attractScreen'),result=$('resultScreen'),resCont=$('resultContent'),hint=$('instructionHint');

function startTimer(){S.time=C.TOTAL_TIME;updTimer();tLabel.classList.add('visible');S.tInt=setInterval(()=>{S.time--;updTimer();if(S.time<=0){clearInterval(S.tInt);if(S.phase==='select')onTimeout()}},1000)}
function updTimer(){const s=Math.max(0,S.time);tDisp.textContent=`00:${String(s).padStart(2,'0')}`;tBar.style.width=(s/C.TOTAL_TIME*100)+'%';tDisp.classList.toggle('urgent',s<=8);tBar.classList.toggle('urgent',s<=8)}
function stopTimer(){clearInterval(S.tInt)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function lerp(a,b,t){return a+(b-a)*t}
function cacheSlots(){S.slots=[];for(let i=0;i<C.CARDS;i++){const r=board.children[i].getBoundingClientRect();S.slots.push({x:r.left,y:r.top})}}

function makeCards(){
  board.innerHTML='';S.prize=Math.floor(Math.random()*C.CARDS);S.cards=[];cardOrder=[];
  for(let i=0;i<C.CARDS;i++){
    cardOrder.push(i);const sl=document.createElement('div');sl.className='card-slot';
    const cd=document.createElement('div');cd.className='card disabled';const isP=i===S.prize;
    const faceIcon=isP?`<img src="${MATE_IMG_SRC}" alt="Mate Dorado">`:'🧉';
    cd.innerHTML=`<div class="card-inner"><div class="card-back-side"><div class="card-back-mate">🧉</div></div><div class="card-face ${isP?'prize':'empty'}"><div class="card-face-icon">${faceIcon}</div><div class="card-face-text">${isP?'¡MATE DORADO!':'Seguí intentando'}</div></div></div>`;
    cd.addEventListener('click',function(){onCard(this)});
    sl.appendChild(cd);board.appendChild(sl);S.cards.push(cd);
  }
  requestAnimationFrame(()=>requestAnimationFrame(()=>cacheSlots()));
}

function prizeSlot(){return cardOrder.indexOf(S.prize)}
function randSlot(ex=[]){let s;do{s=Math.floor(Math.random()*C.CARDS)}while(ex.includes(s));return s}

async function swapSlots(a,b,speed){
  if(a===b)return;const cA=S.cards[a],cB=S.cards[b],pA=S.slots[a],pB=S.slots[b];
  const dx=pB.x-pA.x,dy=pB.y-pA.y;
  cA.classList.add('animating');cB.classList.add('animating');
  cA.style.transition=cB.style.transition=`transform ${speed}ms cubic-bezier(.4,0,.2,1)`;
  cA.offsetHeight;
  cA.style.transform=`translate(${dx}px,${dy}px)`;cB.style.transform=`translate(${-dx}px,${-dy}px)`;
  await sleep(speed+25);
  cA.style.transition=cB.style.transition='none';cA.style.transform=cB.style.transform='';
  cA.classList.remove('animating');cB.classList.remove('animating');
  const sA=board.children[a],sB=board.children[b],ph=document.createElement('div');
  sA.parentNode.insertBefore(ph,sA);sB.parentNode.insertBefore(sA,sB);ph.parentNode.insertBefore(sB,ph);ph.remove();
  [S.cards[a],S.cards[b]]=[S.cards[b],S.cards[a]];[cardOrder[a],cardOrder[b]]=[cardOrder[b],cardOrder[a]];
  cacheSlots();rebindClicks();
}

async function doubleSwap(a,b,c,d,speed){
  const cA=S.cards[a],cB=S.cards[b],cC=S.cards[c],cD=S.cards[d];
  const pA=S.slots[a],pB=S.slots[b],pC=S.slots[c],pD=S.slots[d];
  const dx1=pB.x-pA.x,dy1=pB.y-pA.y,dx2=pD.x-pC.x,dy2=pD.y-pC.y;
  [cA,cB,cC,cD].forEach(c=>c.classList.add('animating'));
  cA.style.transition=cB.style.transition=cC.style.transition=cD.style.transition=`transform ${speed}ms cubic-bezier(.4,0,.2,1)`;
  cA.offsetHeight;
  cA.style.transform=`translate(${dx1}px,${dy1}px)`;cB.style.transform=`translate(${-dx1}px,${-dy1}px)`;
  cC.style.transform=`translate(${dx2}px,${dy2}px)`;cD.style.transform=`translate(${-dx2}px,${-dy2}px)`;
  await sleep(speed+25);
  [cA,cB,cC,cD].forEach(c=>{c.style.transition='none';c.style.transform='';c.classList.remove('animating')});
  let sA=board.children[a],sB=board.children[b],ph=document.createElement('div');
  sA.parentNode.insertBefore(ph,sA);sB.parentNode.insertBefore(sA,sB);ph.parentNode.insertBefore(sB,ph);ph.remove();
  [S.cards[a],S.cards[b]]=[S.cards[b],S.cards[a]];[cardOrder[a],cardOrder[b]]=[cardOrder[b],cardOrder[a]];
  let sC=board.children[c],sD=board.children[d];ph=document.createElement('div');
  sC.parentNode.insertBefore(ph,sC);sD.parentNode.insertBefore(sC,sD);ph.parentNode.insertBefore(sD,ph);ph.remove();
  [S.cards[c],S.cards[d]]=[S.cards[d],S.cards[c]];[cardOrder[c],cardOrder[d]]=[cardOrder[d],cardOrder[c]];
  cacheSlots();rebindClicks();
}

function rebindClicks(){for(let i=0;i<C.CARDS;i++){const old=S.cards[i];const nc=old.cloneNode(true);old.parentNode.replaceChild(nc,old);nc.addEventListener('click',function(){onCard(this)});S.cards[i]=nc}}
function distractShake(ex=[]){const t=[];for(let i=0;i<C.CARDS;i++){if(!ex.includes(i))t.push(i)}if(!t.length)return;const n=1+Math.floor(Math.random()*2);for(let j=0;j<n&&j<t.length;j++){const s=t[Math.floor(Math.random()*t.length)];S.cards[s].classList.add('shake');setTimeout(()=>S.cards[s].classList.remove('shake'),350)}}
function distractPulse(ex=[]){const t=[];for(let i=0;i<C.CARDS;i++){if(!ex.includes(i))t.push(i)}if(!t.length)return;const s=t[Math.floor(Math.random()*t.length)];S.cards[s].classList.add('pulse-distract');setTimeout(()=>S.cards[s].classList.remove('pulse-distract'),400)}

async function doShuffle(){
  S.phase='shuffle';phaseT.textContent='¡SE MEZCLAN!';hint.textContent='Seguí el mate dorado con la mirada...';
  await sleep(500);
  for(let r=0;r<C.SHUFFLE_ROUNDS;r++){
    if(S.phase!=='shuffle')return;
    const t=r/(C.SHUFFLE_ROUNDS-1),speed=Math.round(lerp(C.SWAP_SPEED_START,C.SWAP_SPEED_END,t)),pause=Math.round(lerp(C.SWAP_PAUSE_START,C.SWAP_PAUSE_END,t));
    const a=randSlot(),b=randSlot([a]);
    if(r>=C.DOUBLE_SWAP_START&&Math.random()<C.DOUBLE_SWAP_CHANCE){const c=randSlot([a,b]),d=randSlot([a,b,c]);if(Math.random()<.5)distractShake([a,b,c,d]);await doubleSwap(a,b,c,d,speed)}
    else if(Math.random()<C.TRIPLE_MOVE_CHANCE&&r>2){distractShake([a,b]);distractPulse([a,b]);await swapSlots(a,b,speed)}
    else{if(Math.random()<C.SHAKE_CHANCE&&r>1)distractShake([a,b]);if(Math.random()<C.PULSE_CHANCE&&r>2)distractPulse([a,b]);await swapSlots(a,b,speed)}
    await sleep(pause);
  }
  selectPhase();
}

function startGame(){attract.classList.remove('active');result.classList.remove('active');clearAll();makeCards();startTimer();requestAnimationFrame(()=>requestAnimationFrame(()=>{cacheSlots();S.phase='reveal';phaseT.textContent='¡MEMORIZÁ LA POSICIÓN!';hint.textContent='Recordá dónde está el Mate Dorado';S.cards[prizeSlot()].classList.add('flipped');setTimeout(()=>{if(S.phase!=='reveal')return;S.cards[prizeSlot()].classList.remove('flipped');setTimeout(()=>doShuffle(),500)},C.REVEAL_TIME)}))}

function selectPhase(){S.phase='select';phaseT.textContent='¡ELEGÍ UNA CARTA!';hint.textContent='¡Tocá donde creés que está el Mate Dorado!';S.cards.forEach(c=>c.classList.remove('disabled'));S.gTo=setTimeout(()=>{if(S.phase==='select')onTimeout()},C.SELECT_TIME)}

function onCard(cardEl){if(S.phase!=='select')return;S.phase='result';clearTimeout(S.gTo);stopTimer();S.cards.forEach(c=>c.classList.add('disabled'));let slot=-1;for(let i=0;i<C.CARDS;i++){if(S.cards[i]===cardEl){slot=i;break}}if(slot===-1)return;const won=cardOrder[slot]===S.prize;S.cards[slot].classList.add('selected');setTimeout(()=>{S.cards[slot].classList.add('flipped');if(won){setTimeout(()=>showResult(true),800)}else{setTimeout(()=>{flipAllCards(slot);setTimeout(()=>showResult(false),2200)},700)}},300)}

function flipAllCards(skip){const ps=prizeSlot();for(let i=0;i<C.CARDS;i++){if(i===skip)continue;setTimeout(()=>{if(i===ps)S.cards[i].classList.add('reveal-prize');S.cards[i].classList.add('flipped')},i*180)}}

function onTimeout(){S.phase='result';stopTimer();S.cards.forEach(c=>c.classList.add('disabled'));const ps=prizeSlot();for(let i=0;i<C.CARDS;i++){setTimeout(()=>{if(i===ps)S.cards[i].classList.add('reveal-prize');S.cards[i].classList.add('flipped')},i*180)}setTimeout(()=>showResult(false,true),2200)}

function showResult(won,timeout=false){
  phaseT.textContent='';hint.textContent='';const btn=won?'JUGAR DE NUEVO':'INTENTAR DE NUEVO';
  const mateImg=`<img class="result-icon" src="${MATE_IMG_SRC}" alt="Mate Dorado">`;
  if(won){doConfetti();resCont.innerHTML=`${mateImg}<div class="result-title win">¡GANASTE!</div><div class="result-sub">¡Felicitaciones! Encontraste el Mate Dorado<br>Acercate al stand de Playadito para retirar tu premio.</div><button class="result-restart-btn" id="restartBtn">${btn}</button><div class="result-auto-hint">O esperá para reinicio automático</div>`}
  else if(timeout){resCont.innerHTML=`<div class="result-icon-emoji">⏰</div><div class="result-title lose">¡TIEMPO!</div><div class="result-sub">No llegaste a elegir...<br>¡Pero podés volver a intentarlo!</div><button class="result-restart-btn" id="restartBtn">${btn}</button><div class="result-auto-hint">O esperá para reinicio automático</div>`}
  else{resCont.innerHTML=`<div class="result-icon-emoji">😅</div><div class="result-title lose">¡CASI!</div><div class="result-sub">No era esa carta...<br>¡Cada intento es una nueva oportunidad!</div><button class="result-restart-btn" id="restartBtn">${btn}</button><div class="result-auto-hint">O esperá para reinicio automático</div>`}
  result.classList.add('active');$('restartBtn').addEventListener('click',e=>{e.stopPropagation();startGame()});S.iTo=setTimeout(resetAttract,C.INACTIVITY);
}

function doConfetti(){const ct=document.getElementById('confettiContainer');ct.innerHTML='';const em=['🎉','🏆','⭐','✨','🧉','🥇','🎊','💛'];for(let i=0;i<60;i++){const e=document.createElement('div');e.className='confetti';e.textContent=em[Math.floor(Math.random()*em.length)];e.style.cssText=`left:${Math.random()*100}vw;top:-4vh;animation-duration:${2.5+Math.random()*3}s;animation-delay:${Math.random()*2}s;font-size:${2+Math.random()*2.8}vw`;ct.appendChild(e)}setTimeout(()=>ct.innerHTML='',7000)}

function resetAttract(){clearAll();S.phase='attract';result.classList.remove('active');attract.classList.add('active');tDisp.textContent='00:30';tDisp.classList.remove('urgent');tBar.style.width='100%';tBar.classList.remove('urgent');tLabel.classList.remove('visible');phaseT.textContent='';hint.textContent='';board.innerHTML=''}
function clearAll(){clearInterval(S.tInt);clearTimeout(S.gTo);clearTimeout(S.iTo)}

attract.addEventListener('click',()=>{if(S.phase==='attract')startGame()});
resetAttract();
</script>
</body>
